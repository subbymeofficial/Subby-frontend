<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="SubbyMe">
  <!-- Rounded blue square -->
  <rect width="200" height="200" rx="36" ry="36" fill="#2E3192"/>

  <!-- Hard hat silhouette (top-center, white) -->
  <g fill="#FFFFFF" transform="translate(100 60)">
    <!-- brim -->
    <rect x="-44" y="6" width="88" height="8" rx="3"/>
    <!-- dome -->
    <path d="M -36 6 C -36 -22 36 -22 36 6 Z"/>
    <!-- crest stripe -->
    <rect x="-3" y="-18" width="6" height="20" fill="#FBBF24"/>
  </g>

  <!-- SM monogram -->
  <text x="100" y="138"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="64"
        letter-spacing="2"
        fill="#FFFFFF">SM</text>
</svg>
