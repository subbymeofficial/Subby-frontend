<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" role="img" aria-label="SubbyMe">
  <!-- Royal-blue background -->
  <rect width="1200" height="1000" fill="#2E3192"/>

  <!-- Frame: two halves of a single rectangle that share a common edge -->
  <!-- Outer block sits between x=140..1060 (width 920), y=400..640 (height 240) -->
  <g>
    <!-- Left half: white border -->
    <rect x="140" y="400" width="460" height="240" fill="none" stroke="#FFFFFF" stroke-width="6"/>
    <!-- Right half: dark navy border, slightly nudged for two-tone effect -->
    <rect x="600" y="406" width="460" height="240" fill="none" stroke="#0B1230" stroke-width="6"/>
  </g>

  <!-- Wordmark: SUBBY ME -->
  <text x="600" y="525"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="92"
        letter-spacing="1"
        fill="#FFFFFF">SUBBY ME</text>
</svg>
